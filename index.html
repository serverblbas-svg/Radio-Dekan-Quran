<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Dekan Quran</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* دیزاینی شاهانەی سادە و کورت */
        body {
            background-color: #0d0d0d;
            color: #f3e5ab; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 550px;
            margin: 20px auto;
            background: #141414;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #d4af37; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        h1 {
            font-size: 24px;
            color: #d4af37;
            margin: 0 0 15px 0;
        }
        
        /* بەشی پێدەری دەنگ */
        .player-section {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        #current-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
        }
        video {
            width: 100%;
            height: 45px;
            background: #222;
            border-radius: 5px;
            outline: none;
        }
        
        /* یەک لیستی ڕێک لەسەر یەک */
        .juz-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 55vh;
            overflow-y: auto;
            padding-left: 5px;
        }
        
        /* ستایلی سکڕۆڵ بار */
        .juz-list::-webkit-scrollbar {
            width: 5px;
        }
        .juz-list::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 3px;
        }
        
        .card {
            background: #1e1e1e;
            padding: 12px 20px;
            border-radius: 6px;
            border: 1px solid #252525;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            font-weight: bold;
            color: #ccc;
            display: flex;
            justify-content: geopolitical;
            align-items: center;
            justify-content: space-between; /* بۆ ئەوەی ناوەکە و ژمارەکە ڕێک بن */
        }
        .card:hover {
            background: #d4af37;
            color: #000;
        }
        .card.active {
            background: #d4af37;
            color: #000;
            border-color: #fff;
        }
        
        /* ستایلی تایبەت بۆ لایڤ و دوعا لەناو لیستەکەدا */
        .live-item {
            background: #linear-gradient(135deg, #bd2130 0%, #dc3545 100%);
            border-color: #dc3545;
            color: #fff;
        }
        .live-item:hover {
            background: #dc3545;
            color: #fff;
        }
        .dua-item {
            background: linear-gradient(135deg, #8a6f27 0%, #d4af37 100%);
            color: #000;
            border: none;
        }
        .dua-item:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📻 Radio Dekan Quran</h1>
        </div>

        <div class="player-section">
            <div id="current-title">بار دەکرێت...</div>
            <video id="mainPlayer" controls></video>
        </div>

        <div class="juz-list" id="juzListContainer">
            <div class="card live-item" id="liveBtn" data-index="-1">🔴 پەخشی ڕاستەوخۆی ڕادیۆ دێکان (Live)</div>
        </div>
    </div>

    <script>
        const LIVE_URL = "https://183.bozztv.com/giatv/giatv-dekanquran/dekanquran/chunks.m3u8";

        const playlist = [
            { name: "جوزئی 01", url: "https://dso2.raed.net:454/files/01_e4ecd.mp3" },
            { name: "جوزئی 02", url: "https://dso7.raed.net:451/files/02_dc1d2.mp3" },
            { name: "جوزئی 03", url: "https://dso5.raed.net:452/files/03_5db26.mp3" },
            { name: "جوزئی 04", url: "https://dso5.raed.net:449/files/04_89ebb.mp3" },
            { name: "جوزئی 05", url: "https://dso8.raed.net:455/files/05_953a6.mp3" },
            { name: "جوزئی 06", url: "https://dso2.raed.net:454/files/06.mp3" },
            { name: "جوزئی 07", url: "https://dso5.raed.net:449/files/07.mp3" },
            { name: "جوزئی 08", url: "https://dso2.raed.net:454/files/08_72647.mp3" },
            { name: "جوزئی 09", url: "https://dso2.raed.net:454/files/09_12254.mp3" },
            { name: "جوزئی 10", url: "https://dso2.raed.net:454/files/10.mp3" },
            { name: "جوزئی 11", url: "https://dso5.raed.net:452/files/11_81465.mp3" },
            { name: "جوزئی 12", url: "https://dso2.raed.net:454/files/12_1223c.mp3" },
            { name: "جوزئی 13", url: "https://dso5.raed.net:452/files/13_4696b.mp3" },
            { name: "جوزئی 14", url: "https://dso7.raed.net:451/files/14.mp3" },
            { name: "جوزئی 15", url: "https://dso2.raed.net:454/files/15.mp3" },
            { name: "جوزئی 16", url: "https://dso2.raed.net:454/files/16.mp3" },
            { name: "جوزئی 17", url: "https://dso2.raed.net:454/files/17_5f6e3.mp3" },
            { name: "جوزئی 18", url: "https://dso7.raed.net:451/files/18.mp3" },
            { name: "جوزئی 19", url: "https://dso5.raed.net:449/files/19_528fe.mp3" },
            { name: "جوزئی 20", url: "https://dso5.raed.net:449/files/20_d0992.mp3" },
            { name: "جوزئی 21", url: "https://dso5.raed.net:452/files/21.mp3" },
            { name: "جوزئی 22", url: "https://dso5.raed.net:452/files/22_15d56.mp3" },
            { name: "جوزئی 23", url: "https://dso5.raed.net:452/files/23_deff0.mp3" },
            { name: "جوزئی 24", url: "https://dso5.raed.net:449/files/24_1492a.mp3" },
            { name: "جوزئی 25", url: "https://dso5.raed.net:452/files/25.mp3" },
            { name: "جوزئی 26", url: "https://dso6.raed.net:447/files/26_70fe1.mp3" },
            { name: "جوزئی 27", url: "https://dso2.raed.net:454/files/27.mp3" },
            { name: "جوزئی 28", url: "https://dso5.raed.net:452/files/28.mp3" },
            { name: "جوزئی 29", url: "https://dso2.raed.net:454/files/29_c585a.mp3" },
            { name: "جوزئی 30", url: "https://dso2.raed.net:454/files/30.mp3" },
            { name: "دوعای خەتمی قورئان", url: "https://dso7.raed.net:451/files/031-dua-khatm-al-quran-al-kareem.mp3" }
        ];

        const container = document.getElementById('juzListContainer');
        const player = document.getElementById('mainPlayer');
        const currentLabel = document.getElementById('current-title');
        const liveBtn = document.getElementById('liveBtn');
        let hlsInstance = null;
        let currentIndex = -1; // -1 واتا لایڤ لێدەدات

        function startPlay(url, title, index) {
            currentIndex = index;
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            
            currentLabel.innerText = `ئێستا لێدەدرێت: ${title}`;

            // چالاککردنی دوگمەی هەڵبژێردراو لە لیستەکەدا
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const activeCard = document.querySelector(`[data-index="${index}"]`);
            if(activeCard) activeCard.classList.add('active');

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls();
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(player);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                        player.play().catch(e => console.log(e));
                    });
                } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                    player.src = url;
                    player.play();
                }
            } else {
                player.src = url;
                player.play();
            }
        }

        // بەستنەوەی دوگمەی لایڤ
        liveBtn.onclick = () => {
            startPlay(LIVE_URL, "پەخشی ڕاستەوخۆ (Live)", -1);
        };

        // ڕیزکردنی ٣٠ جوزئەکە بە شێوازی یەک لیست لە خوارەوە
        playlist.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-index', index);
            
            if(item.name === "دوعای خەتمی قورئان") {
                card.classList.add('dua-item');
            }
            
            card.innerText = item.name;
            
            card.onclick = () => {
                startPlay(item.url, item.name, index);
            };
            
            container.appendChild(card);
        });

        // سستەمی دووبارەکردنەوەی ئۆتۆماتیکی (Loop)
        player.onended = () => {
            if (currentIndex !== -1) { // ئەگەر لایڤ نەبوو (جوزئەکان بوو)
                let nextIndex = currentIndex + 1;
                
                // ئەگەر خەتمەکە تەواو بوو (دوای دوعاکە)، دەگەڕێتەوە بۆ جوزئی یەکەم
                if (nextIndex >= playlist.length) {
                    nextIndex = 0;
                }
                
                const nextItem = playlist[nextIndex];
                startPlay(nextItem.url, nextItem.name, nextIndex);
            }
        };

        // لە سەرەتادا خۆی ئۆتۆماتیکی لایڤەکە لێدەدات
        window.onload = () => {
            liveBtn.click();
        };
    </script>
</body>
</html>
